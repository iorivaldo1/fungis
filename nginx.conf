user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    # 1. 开启 gzip 压缩
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # 压缩级别，6 是性能和压缩率的最佳平衡
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml image/x-icon;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    gzip_static on; 
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    include /etc/nginx/conf.d/*.conf;

    server {
        server_name localhost fungis.site www.fungis.site _;

        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        root /etc/nginx/html/fungis;

        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location ^~ /tianditu/img/ {
            proxy_pass http://t0.tianditu.com/img_w/wmts;
            proxy_set_header Host t0.tianditu.com;
        }

        location ^~ /tianditu/cia/ {
            proxy_pass http://t0.tianditu.gov.cn/cia_w/wmts;
            proxy_set_header Host t0.tianditu.gov.cn;
        }

        
        location /geoserver/ {
            proxy_pass http://127.0.0.1:8080/geoserver/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /get_geo_pg/ {
            proxy_pass http://127.0.0.1:8080/get_geo_pg/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /index_beian.html {
            root /etc/nginx/html;
            add_header Cache-Control no-cache;
            add_header Pragma no-cache;
            add_header Expires 0;
        }

        location / {
            try_files $uri /index_beian.html;
        }

        # 跳过备案：前端的直接访问入口，内部优先寻找真实文件，找不到再重写为 /index.html
        location ~ ^/(gispros|hhgl|cesium|tianditu|baidu|three|three-tdt|server-admin)(?:/|$) {
            try_files $uri $uri/ /index.html;
        }
    
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/fungis.site/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/fungis.site/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}



    server {
    if ($host = www.fungis.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = fungis.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost fungis.site www.fungis.site _;
    return 404; # managed by Certbot




}}
