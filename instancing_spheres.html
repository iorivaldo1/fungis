<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>100k Spheres Instancing</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script>
        // Setup scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 100;
        camera.position.y = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // --- Instancing Setup ---
        const instanceCount = 100;

        // Base geometry
        const baseGeometry = new THREE.SphereGeometry(0.5, 16, 16);

        // Instanced geometry
        const instancedGeometry = new THREE.InstancedBufferGeometry().copy(baseGeometry);
        instancedGeometry.instanceCount = instanceCount;

        // Attributes data
        const aCurve = [];
        const aColor = [];

        const colors = [
            new THREE.Color("#ff0000"),
            new THREE.Color("#ff3030"),
            new THREE.Color("#ff6666"),
            new THREE.Color("#0000ff"),
            new THREE.Color("#4f90ff"),
            new THREE.Color("#8888ff")
        ];

        for (let i = 0; i < instanceCount; i++) {
            // Curve params: radius, progress, zOffset, speed
            let radius = Math.random() * 60 + 30; // 10 to 40
            let zOffset = Math.random() * 60 - 5; // -5 to 5
            let progress = Math.random();
            let speed = Math.random() * 0.05 + 0.02; // 0.02 to 0.07

            // Randomly flip x-direction for variety, but without strict separation
            // Or just keep it simple as requested "cancel separate"
            // Let's add a random phase or direction if needed, but for now simple

            aCurve.push(radius, progress, zOffset, speed);

            let color = colors[Math.floor(Math.random() * colors.length)];
            aColor.push(color.r, color.g, color.b);
        }

        instancedGeometry.setAttribute(
            "aCurve",
            new THREE.InstancedBufferAttribute(new Float32Array(aCurve), 4)
        );
        instancedGeometry.setAttribute(
            "aColor",
            new THREE.InstancedBufferAttribute(new Float32Array(aColor), 3)
        );

        // Shader Material
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 }
            },
            vertexShader: `
                uniform float uTime;
                attribute vec4 aCurve;
                attribute vec3 aColor;
                varying vec3 vColor;

                vec3 getCurvePosition(float progress, float radius, float offset){
                    vec3 pos = vec3(0.);
                    
                    pos.x += cos(progress * 3.14159 * 8.0) * radius;
                    
                    pos.y += sin(progress * 3.14159 * 8.0) * radius + sin(progress * 3.14159 * 2.0) * 30.0;
                    pos.z += progress * 200.0 - 100.0 + offset;
                    return pos;
                }

                void main(){
                    vec3 transformed = position;
                    
                    float aRadius = aCurve.x;
                    float aProgressOriginal = aCurve.y;
                    float aZOffset = aCurve.z;
                    float aSpeed = aCurve.w;
                    
                    // Animate progress
                    float currentProgress = mod(aProgressOriginal + uTime * aSpeed * 0.1, 1.0);

                    // Calculate curve position
                    vec3 curvePosition = getCurvePosition(currentProgress, aRadius, aZOffset);
                    
                    transformed += curvePosition;
                    
                    vColor = aColor;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(transformed, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main(){
                    gl_FragColor = vec4(vColor, 1.0);
                }
            `
        });

        const mesh = new THREE.Mesh(instancedGeometry, material);
        scene.add(mesh);

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            material.uniforms.uTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>

</html>
